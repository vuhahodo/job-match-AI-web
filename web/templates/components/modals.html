<!-- Global Loading Overlay -->
<div class="loading-overlay" id="globalLoader">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <h5 class="mt-3 text-secondary">Processing Intelligence...</h5>
</div>

<!-- Auth Modals -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-5 text-center">
                <h3 class="fw-bold mb-4">Welcome Back</h3>

                <form onsubmit="handleLogin(event)">
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email address" value="demo@example.com" required>
                    <input type="password" name="password" class="form-control mb-3" placeholder="Password" value="password" required>
                    <button type="submit" class="btn btn-primary w-100 py-2">Log In</button>
                </form>
                <p class="mt-2 mb-0 small"><a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot password?</a></p>
                <p class="mt-4 small text-muted">Don't have an account? <a href="#" data-bs-toggle="modal"
                        data-bs-target="#registerModal">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="forgotPasswordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-5 text-center">
                <h3 class="fw-bold mb-4">Reset Password (Demo)</h3>
                <form onsubmit="return handleForgotPassword(event)">
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email address" required>
                    <button type="submit" class="btn btn-primary w-100 py-2">Generate Reset Token</button>
                </form>
                <div id="forgotPasswordResult" class="small mt-3 text-start"></div>
                <div class="mt-3">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#resetPasswordModal">
                        I already have a token
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resetPasswordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-5 text-center">
                <h3 class="fw-bold mb-4">Set New Password</h3>
                <form onsubmit="return handleResetPassword(event)">
                    <input type="text" id="resetPasswordToken" name="token" class="form-control mb-3" placeholder="Reset token" required>
                    <input type="password" name="new_password" class="form-control mb-3" placeholder="New password (min 6 chars)" required minlength="6">
                    <button type="submit" class="btn btn-primary w-100 py-2">Reset Password</button>
                </form>
                <div id="resetPasswordResult" class="small mt-3 text-start"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-5 text-center">
                <h3 class="fw-bold mb-4">Create Account</h3>

                <form onsubmit="handleRegister(event)">
                    <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email address" required>
                    <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                    <input type="password" name="confirm_password" class="form-control mb-3" placeholder="Confirm Password" required>
                    <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
                </form>
                <p class="mt-4 small text-muted">Already have an account? <a href="#" data-bs-toggle="modal"
                        data-bs-target="#loginModal">Log In</a></p>
            </div>
        </div>
    </div>
</div>

<!-- Job Detail Modal -->
<div class="modal fade" id="jobModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="jobModalLabel">Job Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-4" id="jobModalBody">
                <!-- Content injected by JS -->
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
