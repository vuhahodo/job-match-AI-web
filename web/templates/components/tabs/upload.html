<div class="tab-pane fade" id="upload" role="tabpanel">
    <div id="analysis-content">
        <!-- Analysis Tool Section -->
        <div id="start-analysis" class="py-5 bg-light rounded-3 px-4 position-relative overflow-hidden">
            <div
                class="position-absolute top-0 start-0 w-100 h-100 border border-primary border-opacity-10 rounded-3 pointer-events-none">
            </div>

            <div class="text-center mb-4 position-relative z-1">
                <span class="badge bg-primary bg-opacity-10 text-primary mb-2">Ready to start?</span>
                <h2 class="fw-bold mb-2">Scan Your CV</h2>
                <p class="text-muted">Upload your CV to unlock detailed insights and job matches.</p>
            </div>

            <form id="uploadForm" enctype="multipart/form-data" class="position-relative z-1">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="upload-area bg-white shadow-sm border-0">
                            <div class="mb-3">
                                <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle"
                                    style="width: 60px; height: 60px;">
                                    <i class="bi bi-cloud-arrow-up fs-3"></i>
                                </div>
                            </div>
                            <h4 class="fw-bold">Drop your PDF here</h4>
                            <p class="text-muted small mb-0">Supports PDF up to 10MB</p>
                            <input type="file" id="pdfFile" name="pdf_file" accept=".pdf" hidden required>
                            <div id="fileNameDisplay" class="mt-3 badge bg-light text-dark border p-2" {% if cv_filename
                                %}style="display:inline-block; font-size: 0.9rem;">📄 {{ cv_filename }}{% else
                                %}style="display:none; font-size: 0.9rem;"{% endif %}></div>
                        </div>
                        <div class="d-grid gap-2 mt-4 col-md-6 mx-auto">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                <i class="bi bi-stars me-2"></i>Analyze Profile
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
