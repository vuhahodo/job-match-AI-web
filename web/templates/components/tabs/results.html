<div class="tab-pane fade" id="results" role="tabpanel">
    <h3 class="fw-bold mb-4">Job Matches</h3>
    <div id="resultsListContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted">Loading your personalized job matches...</p>
            <div class="mt-3">
                <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i>
                    Tip: Upload a CV first to see AI-powered recommendations
                </small>
            </div>
            <button class="btn btn-outline-primary btn-sm mt-3" onclick="window.location.href='{{ url_for(&quot;upload_page&quot;) }}'">
                <i class="bi bi-upload me-1"></i>Upload CV
            </button>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-load results when tab becomes visible
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === "attributes" && mutation.attributeName === "class") {
                        const tabPane = mutation.target;
                        if (tabPane.classList.contains("show") && tabPane.classList.contains("active")) {
                            if (typeof loadResults === 'function') {
                                loadResults();
                            }
                        }
                    }
                });
            });
            
            const resultsTab = document.getElementById('results');
            if (resultsTab) {
                observer.observe(resultsTab, { attributes: true }); // Watch for class changes
                
                // Also check immediately if already active
                if (resultsTab.classList.contains('show') && resultsTab.classList.contains('active')) {
                    if (typeof loadResults === 'function') {
                        loadResults();
                    }
                }
            }
        });
    </script>
</div>
