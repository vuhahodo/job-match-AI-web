<style>
    /* ── Heatmap Job Cards ── */
    .heatmap-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.25rem;
        margin-bottom: 2rem;
    }

    .heatmap-job-card {
        border-radius: 1rem;
        padding: 1.4rem 1.25rem;
        color: #fff;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        border: 2px solid transparent;
    }

    .heatmap-job-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 40px -8px rgba(0,0,0,0.25);
    }

    .heatmap-job-card.selected {
        border-color: rgba(255,255,255,0.5);
        box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
    }

    /* Rank badge */
    .hm-rank {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        width: 28px;
        height: 28px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 800;
    }

    .hm-score-badge {
        display: inline-block;
        background: rgba(255,255,255,0.22);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 800;
        padding: 0.25rem 0.8rem;
        margin-bottom: 0.6rem;
        letter-spacing: 0.02em;
    }

    .hm-title {
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 0.35rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .hm-meta {
        font-size: 0.75rem;
        opacity: 0.85;
    }

    /* Heatmap card base – color is applied inline via JS interpolation */

    /* Detail panels */
    .job-detail-panels {
        display: none;
    }

    .job-detail-panels.visible {
        display: block;
    }

    .gp-panel {
        background: var(--card-bg, #fff);
        border: 1px solid var(--border-color, rgba(0,0,0,0.07));
        border-radius: 1rem;
        box-shadow: 0 4px 20px -4px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .gp-panel-header {
        padding: 0.9rem 1.25rem;
        border-bottom: 1px solid var(--border-color, rgba(0,0,0,0.06));
        font-weight: 700;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .gp-panel-body {
        padding: 1.25rem;
        max-height: 480px;
        overflow-y: auto;
        font-size: 0.875rem;
        line-height: 1.65;
        color: var(--text-color, #374151);
    }

    .gp-panel-body::-webkit-scrollbar { width: 5px; }
    .gp-panel-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .gp-skill-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.3rem 0.7rem;
        border-radius: 50px;
        font-size: 0.78rem;
        font-weight: 600;
        margin: 0.2rem;
    }

    .gp-score-ring {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        font-weight: 800;
        position: relative;
        margin: 0 auto 0.75rem;
    }

    .gp-score-ring::before {
        content: '';
        position: absolute;
        width: 64px;
        height: 64px;
        background: var(--card-bg, #fff);
        border-radius: 50%;
    }

    .gp-score-value {
        position: relative;
        z-index: 1;
        font-size: 1rem;
        font-weight: 800;
        color: #10b981;
    }

    /* Graph section */
    #graph-section {
        margin-top: 2rem;
    }

    /* Dark mode */
    [data-theme="dark"] .gp-panel {
        background: #1f2937;
        border-color: rgba(255,255,255,0.08);
    }

    [data-theme="dark"] .gp-panel-header {
        border-bottom-color: rgba(255,255,255,0.06);
        color: #f1f5f9;
    }

    [data-theme="dark"] .gp-panel-body {
        color: #e2e8f0;
    }

    [data-theme="dark"] .gp-score-ring::before {
        background: #1f2937;
    }

    @media (max-width: 768px) {
        .heatmap-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="tab-pane fade" id="graph" role="tabpanel">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">
            <i class="bi bi-graph-up-arrow text-primary me-2"></i> Knowledge Graph
        </h3>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary" onclick="window.location.href = '{{ url_for('upload_page') }}';">
                <i class="bi bi-arrow-left me-1"></i> New CV
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="initializeGraph(true);">
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh
            </button>
        </div>
    </div>

    <!-- ── TOP 3 JOBS HEATMAP ── -->
    <div id="topJobsSection">
        <div class="d-flex align-items-center gap-2 mb-3">
            <div style="width: 3px; height: 20px; background: linear-gradient(180deg, #2563eb, #7c3aed); border-radius: 3px;"></div>
            <h5 class="fw-bold mb-0">Top 3 Matched Jobs</h5>
            <span class="badge bg-primary bg-opacity-10 text-primary ms-1" style="font-size:0.72rem;">Heatmap</span>
        </div>

        <div id="heatmapGrid" class="heatmap-grid">
            <!-- Filled by JS -->
            <div class="heatmap-job-card hm-low d-flex align-items-center justify-content-center" style="min-height:130px;">
                <div class="text-center opacity-75">
                    <div class="spinner-border spinner-border-sm mb-2"></div>
                    <div style="font-size:0.8rem;">Loading top jobs...</div>
                </div>
            </div>
            <div class="heatmap-job-card hm-medium d-flex align-items-center justify-content-center" style="min-height:130px; opacity:0.5;"></div>
            <div class="heatmap-job-card hm-high d-flex align-items-center justify-content-center" style="min-height:130px; opacity:0.3;"></div>
        </div>

        <!-- Job Detail + AI Assessment Panels (equal width) -->
        <div id="jobDetailPanels" class="job-detail-panels">
            <div class="row g-4">
                <!-- Left: Job Detail -->
                <div class="col-lg-6">
                    <div class="gp-panel h-100">
                        <div class="gp-panel-header" style="background: linear-gradient(135deg, rgba(37,99,235,0.06) 0%, rgba(124,58,237,0.06) 100%);">
                            <i class="bi bi-file-earmark-text text-primary"></i>
                            <span>Job Details</span>
                            <span id="gpJobTitle" class="text-muted fw-normal small ms-auto text-truncate" style="max-width:200px;"></span>
                        </div>
                        <div class="gp-panel-body" id="gpJobDetailBody">
                            <p class="text-muted text-center py-4">Select a job above to see details.</p>
                        </div>
                    </div>
                </div>

                <!-- Right: AI Assessment -->
                <div class="col-lg-6">
                    <div class="gp-panel h-100">
                        <div class="gp-panel-header" style="background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, rgba(16,185,129,0.08) 100%);">
                            <i class="bi bi-stars text-warning"></i>
                            <span>AI Assessment</span>
                        </div>
                        <div class="gp-panel-body" id="gpAIAssessBody">
                            <p class="text-muted text-center py-4">Select a job above to see AI analysis.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── KNOWLEDGE GRAPH ── -->
    <div id="graph-section">
        <div class="d-flex align-items-center justify-content-between mb-3 mt-2">
            <div class="d-flex align-items-center gap-2">
                <div style="width: 3px; height: 20px; background: linear-gradient(180deg, #f59e0b, #ef4444); border-radius: 3px;"></div>
                <h5 class="fw-bold mb-0">Interactive Intelligence Graph</h5>
            </div>
            <div class="small text-muted d-none d-md-block">
                <i class="bi bi-info-circle me-1"></i> Drag to explore • Scroll to zoom
            </div>
        </div>
        <div id="graph-container"
            class="shadow-lg rounded-4 overflow-hidden"
            style="height: 600px; border: 1px solid rgba(0,0,0,0.05); background: #ffffff; position: relative;">
            <!-- Subtle Grid Background -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(circle, #eee 1px, transparent 1px); background-size: 20px 20px; opacity: 0.5; pointer-events: none;"></div>
        </div>
    </div>
</div>

<script>
(function () {
    // ── Dynamic heatmap color interpolation (no library) ──
    function escHtml(s) {
        return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    let topJobs = [];

    async function loadTopJobs() {
        try {
            const res = await fetch('/results');
            if (!res.ok) return;
            const jobs = await res.json();
            if (!Array.isArray(jobs) || jobs.length === 0) {
                document.getElementById('heatmapGrid').innerHTML = `
                    <div class="col-span-3 text-center text-muted py-4" style="grid-column:1/-1;">
                        <i class="bi bi-inbox fs-2 d-block mb-2 opacity-50"></i>
                        No job matches yet. Please upload a CV first.
                    </div>`;
                return;
            }
            topJobs = jobs.slice(0, 3);
            renderHeatmap(topJobs);
        } catch (e) {
            console.error('loadTopJobs error', e);
        }
    }

    function renderHeatmap(jobs) {
        const grid = document.getElementById('heatmapGrid');
        grid.innerHTML = jobs.map((job, i) => {
            const pct  = Math.round(job.score * 100);
            const bgColor = job.color || '#3b82f6';
            const shadow = job.shadow || 'rgba(0,0,0,0.1)';
            
            // Determine text color based on background brightness
            const isDark = isColorDark(bgColor);
            const textColor = isDark ? '#ffffff' : '#1e293b';

            return `
            <div class="heatmap-job-card" id="hmCard${i}"
                 style="background:${bgColor}; box-shadow: 0 8px 24px -6px ${shadow}; color: ${textColor};"
                 onclick="selectHeatmapJob(${i})" title="Click to view details">
                <div class="hm-rank" style="background: ${isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'}">#${i + 1}</div>
                <div class="hm-score-badge" style="background: ${isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)'}; border-color: ${isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)'};">${pct}% Match</div>
                <div class="hm-title">${escHtml(job.title)}</div>
                <div class="hm-meta">
                    <i class="bi bi-building me-1"></i>${escHtml(job.company)}
                    &nbsp;·&nbsp;
                    <i class="bi bi-geo-alt me-1"></i>${escHtml(job.city)}
                </div>
            </div>`;
        }).join('');
    }

    function isColorDark(hexcolor) {
        if (!hexcolor || hexcolor.length < 7) return true;
        const r = parseInt(hexcolor.slice(1, 3), 16);
        const g = parseInt(hexcolor.slice(3, 5), 16);
        const b = parseInt(hexcolor.slice(5, 7), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        return (yiq < 128);
    }

    window.selectHeatmapJob = async function (idx) {
        // Update card selection
        topJobs.forEach((_, i) => {
            const card = document.getElementById('hmCard' + i);
            if (card) card.classList.toggle('selected', i === idx);
        });

        const job = topJobs[idx];
        if (!job) return;

        // Show panels
        const panels = document.getElementById('jobDetailPanels');
        panels.classList.add('visible');

        const jobDetailBody = document.getElementById('gpJobDetailBody');
        const aiAssessBody = document.getElementById('gpAIAssessBody');
        const titleEl = document.getElementById('gpJobTitle');

        titleEl.textContent = job.title;
        jobDetailBody.innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></div>';
        aiAssessBody.innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm text-warning"></div></div>';

        try {
            const res = await fetch(`/job/${job.id}`);
            const detail = await res.json();

            if (detail.error) {
                jobDetailBody.innerHTML = `<div class="text-danger">Error: ${escHtml(detail.error)}</div>`;
                return;
            }

            // ── Job Details pane ──
            const parts = [];
            if (detail.description) parts.push(`<div class="mb-3"><h6 class="fw-bold text-primary small text-uppercase mb-2">Description</h6><div style="white-space:pre-line;">${escHtml(detail.description)}</div></div>`);
            if (detail.requirements) parts.push(`<div class="mb-3"><h6 class="fw-bold text-primary small text-uppercase mb-2">Requirements</h6><div style="white-space:pre-line;">${escHtml(detail.requirements)}</div></div>`);
            if (detail.benefits) parts.push(`<div class="mb-3"><h6 class="fw-bold text-primary small text-uppercase mb-2">Benefits</h6><div style="white-space:pre-line;">${escHtml(detail.benefits)}</div></div>`);
            if (!parts.length) parts.push('<p class="text-muted">Full details available on the application page.</p>');

            parts.push(`<a href="${escHtml(detail.url)}" target="_blank" class="btn btn-primary btn-sm mt-2 w-100 rounded-pill">Apply Now <i class="bi bi-box-arrow-up-right ms-1"></i></a>`);
            jobDetailBody.innerHTML = parts.join('');

            // ── AI Assessment pane ──
            const pct = Math.round((detail.score || 0) * 100);
            const coveragePct = detail.skill_coverage || '0%';
            
            // Use backend color for ring if available, else fallback
            const ringColor = job.color || '#10b981';
            const ringGrad = `conic-gradient(${ringColor} ${pct * 3.6}deg, #e5e7eb 0)`;

            const matched = (detail.matched_skills || []).slice(0, 10).map(s =>
                `<span class="gp-skill-badge" style="background:rgba(16,185,129,0.1);color:#059669;border:1px solid rgba(16,185,129,0.25);">
                    <i class="bi bi-check-lg"></i>${escHtml(s.skill || s)}
                </span>`).join('');

            const missing = (detail.missing_skills || []).slice(0, 8).map(s =>
                `<span class="gp-skill-badge" style="background:rgba(239,68,68,0.08);color:#dc2626;border:1px solid rgba(239,68,68,0.2);">
                    ${escHtml(s.name || s)}
                </span>`).join('');

            aiAssessBody.innerHTML = `
                <div class="text-center mb-4">
                    <div class="gp-score-ring" style="background:${ringGrad}">
                        <span class="gp-score-value">${pct}%</span>
                    </div>
                    <div class="small fw-bold text-muted">Matching Confidence</div>
                </div>

                <div class="p-3 rounded-3 border mb-3" style="background:rgba(59,130,246,0.04);">
                    <h6 class="fw-bold small mb-1"><i class="bi bi-chat-left-dots text-primary me-1"></i>AI Insight</h6>
                    <p class="small text-muted mb-0">${escHtml(detail.ai_insight || '')}</p>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between small mb-1">
                        <span class="text-muted">Skill Coverage</span>
                        <span class="fw-bold text-primary">${escHtml(coveragePct)}</span>
                    </div>
                    <div style="height:7px;background:rgba(0,0,0,0.06);border-radius:4px;overflow:hidden;">
                        <div style="height:100%;width:${escHtml(coveragePct)};background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:4px;transition:width 1s ease;"></div>
                    </div>
                </div>

                ${matched ? `<div class="mb-3"><h6 class="fw-bold small mb-2">Matched Skills</h6><div>${matched}</div></div>` : ''}
                ${missing ? `<div class="mb-2"><h6 class="fw-bold small mb-2 text-warning">Missing Skills</h6><div>${missing}</div></div>` : ''}

                <a href="/job-detail/${escHtml(String(job.id))}" class="btn btn-outline-primary btn-sm w-100 rounded-pill mt-2">
                    <i class="bi bi-info-circle me-1"></i>Full Analysis Page
                </a>`;

        } catch (e) {
            jobDetailBody.innerHTML = `<div class="text-danger">Failed to load job details.</div>`;
            aiAssessBody.innerHTML = '';
        }
    };

    // Load top jobs when this tab becomes visible
    document.addEventListener('DOMContentLoaded', () => {
        loadTopJobs();
    });
})();
</script>
