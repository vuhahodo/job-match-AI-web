{% extends "base.html" %}

{% block content %}
<div class="tab-content shadow-sm border-0 p-3">
    <div class="tab-pane fade" id="cv-scan" role="tabpanel">
        <div id="cvScanContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted">Loading CV Scan Results...</p>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tab = document.getElementById('cv-scan');
        if (tab) tab.classList.add('show', 'active');
        if (typeof loadCVScanResults === 'function') loadCVScanResults();
    });
</script>
{% endblock %}
