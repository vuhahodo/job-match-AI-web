{% extends "base.html" %}

{% block content %}
<div class="tab-content shadow-sm border-0 p-3">
    {% include 'components/tabs/dashboard.html' %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tab = document.getElementById('dashboard');
        if (tab) tab.classList.add('show', 'active');
        // Trigger load
        if (typeof loadDashboardMockData === 'function') loadDashboardMockData();
    });
</script>
{% endblock %}
